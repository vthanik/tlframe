reference:
  - title: "Pipeline Entry Points"
    desc: >
      Every tlframe pipeline starts here. `fr_table()` creates a spec object
      from a data frame. `fr_listing()` and `fr_figure()` create specs for
      patient listings and embedded figures. All three return an `fr_spec`
      that flows through the same pipeline verbs.
    contents:
      - fr_table
      - fr_listing
      - fr_figure

  - title: "Column Configuration"
    desc: >
      `fr_cols()` controls labels, widths, alignment, visibility, N-counts,
      and column splitting. `fr_col()` is the constructor for individual
      column specs. Width modes: fixed inches, percentages, `"auto"`,
      `"fit"`, and `"equal"`.
    contents:
      - fr_cols
      - fr_col

  - title: "Titles and Footnotes"
    desc: >
      `fr_titles()` adds 1--4 centered title lines. `fr_footnotes()` adds
      footnotes with placement control. Both support inline markup.
    contents:
      - fr_titles
      - fr_footnotes

  - title: "Header Presentation"
    desc: >
      `fr_header()` controls header styling (bold, alignment, colors).
      N-counts are set via `fr_cols(.n=)`. `fr_spans()` adds spanning
      headers that group columns under a shared label.
    contents:
      - fr_header
      - fr_spans

  - title: "Page Layout"
    desc: >
      Paper size, orientation, margins, fonts, running headers/footers,
      and token substitution (`{thepage}`, `{program}`, `{datetime}`).
    contents:
      - fr_page
      - fr_pagehead
      - fr_pagefoot
      - fr_spacing

  - title: "Row Organization"
    desc: >
      `fr_rows()` handles `group_by`, `page_by`, `indent_by`, `blank_after`,
      `sort_by`, and `repeat_cols`. `fr_rows_matches()` creates data-driven
      row selectors for use with styling verbs.
    contents:
      - fr_rows
      - fr_rows_matches

  - title: "Rules and Borders"
    desc: >
      Horizontal rules (`fr_hlines()`), vertical rules (`fr_vlines()`),
      and full grids (`fr_grid()`). Preset names or custom placement.
    contents:
      - fr_hlines
      - fr_vlines
      - fr_grid

  - title: "Cell Styling"
    desc: >
      Conditional formatting for cells, rows, or columns. Later styles
      override earlier ones; narrower scopes win (cell > row > column).
    contents:
      - fr_style
      - fr_row_style
      - fr_col_style
      - fr_style_if
      - fr_styles
      - fr_style_explain

  - title: "Inline Markup"
    desc: >
      Rich text in any string. Produces backend-agnostic sentinel tokens
      resolved at render time.
    contents:
      - fr_super
      - fr_sub
      - fr_bold
      - fr_italic
      - fr_underline
      - fr_newline
      - fr_dagger
      - fr_ddagger
      - fr_emdash
      - fr_endash
      - fr_unicode

  - title: "Theme and Configuration"
    desc: >
      Three-tier defaults: YAML config < session theme < per-table verbs.
    contents:
      - fr_theme
      - fr_theme_set
      - fr_theme_get
      - fr_theme_reset
      - fr_config
      - fr_config_get
      - fr_config_reset

  - title: "Recipes"
    desc: >
      Reusable pipeline fragments. Create once, apply to any spec.
    contents:
      - fr_recipe
      - c.fr_recipe
      - fr_apply

  - title: "Rendering"
    desc: >
      Produce RTF, PDF, or LaTeX output from a finalized spec.
    contents:
      - fr_render
      - fr_backends
      - fr_register_backend

  - title: "Validation and Inspection"
    desc: >
      Pre-render checks and programmatic access to spec internals.
    contents:
      - fr_validate
      - fr_get_data
      - fr_get_columns
      - fr_get_col
      - fr_get_titles
      - fr_get_footnotes
      - fr_get_page
      - fr_get_rules
      - fr_get_styles

  - title: "Built-in Datasets"
    desc: >
      Synthetic CDISC ADaM datasets from study TFRM-2024-001 (135 subjects).
    contents:
      - adsl
      - adae
      - adtte
      - adcm
      - advs
      - tbl_demog
      - tbl_ae_soc
      - tbl_ae_summary
      - tbl_disp
      - tbl_tte
      - tbl_cm
      - tbl_vs

