reference:
  - title: "Pipeline Entry Points"
    desc: >
      Every tlframe pipeline starts here. `fr_table()` creates a spec object
      from a data frame. `fr_listing()` and `fr_figure()` create specs for
      patient listings and embedded figures. `fr_figure()` accepts a single
      plot or a list of plots for multi-page figures, with optional per-page
      metadata tokens. All three return an `fr_spec` that flows through the
      same pipeline verbs.
    contents:
      - fr_table
      - fr_listing
      - fr_figure

  - title: "Column Configuration"
    desc: >
      `fr_cols()` is the single source of truth for column structure: labels,
      widths, alignment, visibility, N-counts, and column splitting.
      `fr_col()` constructs individual column specs. Width modes: fixed inches,
      percentages, `"auto"` (content-measured), `"fit"` (scale to page width),
      and `"equal"` (divide remaining space). Alignment modes include
      `"decimal"` for stat-display alignment. N-counts accept named vectors,
      data frames, or lists and auto-route to spanning headers or column labels.
      `fr_col(group=)` creates inline spanning headers. Tidyselect formula
      syntax applies shared specs to multiple columns at once.
    contents:
      - fr_cols
      - fr_col

  - title: "Titles and Footnotes"
    desc: >
      `fr_titles()` adds title lines above the table. Each argument is one
      line; plain text or the list form for per-line `align`, `bold`, and
      `font_size` overrides. `fr_footnotes()` adds footnote lines with
      `.placement` (`"every"` / `"last"`), `.separator` (rule above block),
      and per-line overrides via the list form. Both support inline
      `{fr_*()}` markup.
    contents:
      - fr_titles
      - fr_footnotes

  - title: "Header Presentation"
    desc: >
      `fr_header()` controls header presentation: bold, `align` (scalar or
      tidyselect named list for per-column targeting), `valign`
      (`"bottom"` default aligns short labels under multi-line ones),
      `bg`/`fg` colors, `font_size`, and `repeat_on_page`. N-counts are
      set via `fr_cols(.n=)`. `fr_spans()` adds spanning headers at one or
      more levels (`.level`) with optional underline (`.hline`) and gap
      columns (`.gap`). For simple grouping, use `fr_col(group=)` inside
      `fr_cols()` instead.
    contents:
      - fr_header
      - fr_spans

  - title: "Page Layout"
    desc: >
      Paper size, orientation, margins, fonts, and pagination controls.
      `fr_page()` sets `orphan_min`/`widow_min` (default 3 rows), a
      `continuation` label for multi-page tables, `col_gap` (inter-column
      padding), and `tokens` (named list for custom `{token}` values).
      `fr_pagehead()` and `fr_pagefoot()` define three-zone running chrome
      with token substitution: built-in `{thepage}`, `{total_pages}`,
      `{program}`, `{datetime}`, plus any custom tokens.
      `fr_spacing()` controls blank lines at five table junctions.
    contents:
      - fr_page
      - fr_pagehead
      - fr_pagefoot
      - fr_spacing

  - title: "Row Organization"
    desc: >
      `fr_rows()` handles `group_by` (keep-together groups), `page_by` (page
      breaks with a group label), `indent_by` (single-level string or
      multi-level named list for SOC/HLT/PT hierarchies), `group_label`
      (inject group values as header rows into a display column),
      `blank_after`, `sort_by`, `repeat_cols`, `wrap`, and `group_keep`.
      `fr_rows_matches()` creates data-driven row selectors (exact value or
      regex) for use in styling verbs.
    contents:
      - fr_rows
      - fr_rows_matches

  - title: "Rules and Borders"
    desc: >
      Horizontal rules (`fr_hlines()`), vertical rules (`fr_vlines()`),
      and full grids (`fr_grid()`). Named presets (`"header"`, `"booktabs"`,
      `"box"`, `"void"`, etc.) or custom `width`, `color`, and `linestyle`
      for all rules in the set.
    contents:
      - fr_hlines
      - fr_vlines
      - fr_grid

  - title: "Cell Styling"
    desc: >
      Cell, row, and column style overrides applied via `fr_styles()`.
      `fr_style()` targets cells by position, region, or tidyselect column
      selection; supports `colspan`/`rowspan` for merging. `fr_row_style()`
      and `fr_col_style()` apply uniformly across rows or columns.
      `fr_style_if()` applies styles data-driven: a formula or function
      evaluates cell values at render time. Narrower scope wins:
      cell > row > column; later styles override earlier ones.
      `fr_style_explain()` audits the resolved styles.
    contents:
      - fr_style
      - fr_row_style
      - fr_col_style
      - fr_style_if
      - fr_styles
      - fr_style_explain

  - title: "Inline Markup"
    desc: >
      Rich text in any string field -- titles, footnotes, column labels, cell
      values. Includes `fr_super()`/`fr_sub()` (superscript/subscript),
      `fr_bold()`/`fr_italic()`/`fr_underline()` (font style),
      `fr_dagger()`/`fr_ddagger()` (regulatory symbols), em/en dashes,
      `fr_newline()` (line break within a cell), and `fr_unicode()` for
      arbitrary Unicode characters. Sentinel tokens are resolved per-backend
      at render time.
    contents:
      - fr_super
      - fr_sub
      - fr_bold
      - fr_italic
      - fr_underline
      - fr_newline
      - fr_dagger
      - fr_ddagger
      - fr_emdash
      - fr_endash
      - fr_unicode

  - title: "Theme and Configuration"
    desc: >
      Four-tier defaults: package defaults < `_tlframe.yml` (auto-discovered)
      < `fr_theme()` (session-wide) < per-table verbs. `fr_config()` loads a
      YAML file covering page layout, fonts, column behavior, header style,
      rules, spacing, tokens, and footnote defaults. `fr_theme()` sets the
      same options programmatically. `fr_theme_get()` / `fr_theme_reset()`
      inspect and clear the session theme.
    contents:
      - fr_theme
      - fr_theme_set
      - fr_theme_get
      - fr_theme_reset
      - fr_config
      - fr_config_get
      - fr_config_reset

  - title: "Recipes"
    desc: >
      Reusable pipeline fragments. `fr_recipe()` captures a sequence of
      `fr_*()` verb calls as a language object (survives `saveRDS()`). Apply
      with `fr_apply(spec, recipe)`. Compose multiple recipes with `c()`:
      later verbs override earlier replace-mode verbs and append to
      accumulate-mode verbs (`fr_spans`, `fr_styles`).
    contents:
      - fr_recipe
      - c.fr_recipe
      - fr_apply

  - title: "Rendering"
    desc: >
      `fr_render(spec, path)` writes RTF, LaTeX source (`.tex`), or PDF
      (via XeLaTeX). Format is detected from the file extension. PDF requires
      XeLaTeX or tinytex; call `fr_install_latex_deps()` once to install
      required LaTeX packages. `fr_backends()` lists registered backends;
      `fr_register_backend()` / `fr_unregister_backend()` extend the system
      with custom output formats.
    contents:
      - fr_render
      - fr_backends
      - fr_register_backend
      - fr_unregister_backend
      - fr_latex_deps
      - fr_install_latex_deps

  - title: "Validation and Inspection"
    desc: >
      `fr_validate()` checks a spec before rendering: column names, span
      contiguity, width budget, style index range, font recognition, and
      listing-specific columns. Returns the spec invisibly (pipeline-safe).
      `fr_get_*()` getters provide programmatic read access to every spec
      component for QC scripts. `is.fr_spec()` / `is.fr_col()` test
      object types.
    contents:
      - fr_validate
      - fr_get_data
      - fr_get_columns
      - fr_get_col
      - fr_get_titles
      - fr_get_footnotes
      - fr_get_page
      - fr_get_rules
      - fr_get_styles
      - is.fr_spec
      - is.fr_col

  - title: "Built-in Datasets"
    desc: >
      Synthetic CDISC ADaM datasets from study TFRM-2024-001 (135 subjects,
      Zomerane vs placebo). Raw ADaM: `adsl`, `adae`, `adtte`, `adcm`,
      `advs`. Pre-summarized TFL-ready: `tbl_demog`, `tbl_ae_soc`,
      `tbl_ae_summary`, `tbl_disp`, `tbl_tte`, `tbl_cm`, `tbl_vs` -- each
      ready for direct use with `fr_table()`.
    contents:
      - adsl
      - adae
      - adtte
      - adcm
      - advs
      - tbl_demog
      - tbl_ae_soc
      - tbl_ae_summary
      - tbl_disp
      - tbl_tte
      - tbl_cm
      - tbl_vs

