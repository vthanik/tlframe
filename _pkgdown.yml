home:
  title: "tlframe — Regulatory-Grade Clinical Tables in R"
  description: >
    An R package for pharmaceutical submissions. Describe a table once
    with an immutable pipeline — tlframe renders both RTF and PDF natively.
    No intermediate HTML, no gt dependency, no RMarkdown pipeline.

